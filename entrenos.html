<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlowApp - Entrenamientos</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="entrenos.css">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Menú</h2>
            <button id="close-menu" class="btn-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <ul class="nav-links">
            <li onclick="window.location.href='index.html'" style="display:flex; align-items:center; gap:10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg> Journaling
            </li>
            <li onclick="window.location.href='habitos.html'" style="display:flex; align-items:center; gap:10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Hábitos
            </li>
            <li class="active" onclick="window.location.href='entrenos.html'" style="display:flex; align-items:center; gap:10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v8H2z"></path><path d="M6 8v8"></path><path d="M14 8v8"></path><path d="M5 8H4a4 4 0 0 0 0 8h1"></path></svg> Entrenamientos
            </li>
        </ul>
    </nav>
    <div id="overlay" class="overlay"></div>

    <div class="app-container">
        <header>
            <div class="header-top">
                <button id="menu-btn" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="logo"><span class="gradient-text">Entrenos</span></div>
            </div>
            <div id="view-toggles" class="view-toggles">
                <button class="toggle-btn active" id="btn-day" onclick="changeView('day')">Día</button>
                <button class="toggle-btn" id="btn-week" onclick="changeView('week')">Semana</button>
                <button class="toggle-btn" id="btn-month" onclick="changeView('month')">Mes</button>
            </div>
        </header>

        <main id="main-view">
            <div class="picker-container" id="picker-container"></div>
            
            <div id="start-screen" class="hidden">
                <h2 class="start-title">¿Qué toca hoy?</h2>
                <div id="routines-buttons" class="routines-buttons"></div>
                <button class="btn-skip" onclick="skipToLogs()">Omitir y ver registros</button>
            </div>

            <div id="logs-screen" class="hidden">
                <div id="logs-container" class="logs-container"></div>
            </div>

            <div id="fab-overlay" class="fab-overlay hidden" onclick="toggleFab()"></div>

            <div id="fab-container" class="fab-wrapper hidden">
                <div id="fab-menu" class="fab-menu">
                    <div class="fab-item" onclick="forceStartWorkout(); toggleFab();">
                        <span class="fab-label">Iniciar entrenamiento</span>
                        <button class="fab-mini fire">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
                        </button>
                    </div>
                    <div class="fab-item" onclick="openLibrary(); toggleFab();">
                        <span class="fab-label">Mis rutinas</span>
                        <button class="fab-mini add">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                </div>
                <button id="fab-main" class="fab-main" onclick="toggleFab()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </main>

        <div id="library-panel" class="modal-panel hidden">
            <div class="modal-header">
                <h2 class="gradient-text">Mis Rutinas</h2>
                <button class="btn-icon close-modal" onclick="closeModals()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="library-list" class="form-content"></div>
            <div style="display: none;padding: 0 24px 30px;"><button class="btn-primary" onclick="openCreateForm()">Nueva Rutina</button></div>
        </div>

        <div id="form-panel" class="modal-panel hidden">
            <div class="modal-header">
                <h2 id="form-title" class="gradient-text">Nueva Rutina</h2>
                <button class="btn-icon close-modal" onclick="closeModals()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="form-content">
                <div class="progressive-form">
                    <div class="form-step active" id="step-r-name">
                        <p class="section-label">1. Nombra tu rutina</p>
                        <input type="text" id="routine-name" placeholder="Ej. Espalda y Bíceps" autocomplete="off">
                    </div>
                    
                    <div class="form-step" id="step-r-color">
                        <p class="section-label">2. Elige un color</p>
                        <div class="color-picker" id="routine-color-picker"></div>
                    </div>
                    
                    <div class="form-step" id="step-r-exercises">
                        <p class="section-label">3. Añade tus ejercicios</p>
                        <div class="search-box">
                            <input type="text" id="exercise-search" placeholder="Escribe para buscar..." autocomplete="off">
                            <div id="search-results" class="search-results hidden"></div>
                        </div>
                        <ul id="selected-exercises" class="selected-exercises"></ul>
                    </div>
                </div>
                
                <button id="btn-save-routine" class="btn-primary" onclick="saveRoutine()" disabled>Guardar Rutina</button>
            </div>
        </div>

        <div id="deck-container" class="hidden">
            <div class="deck-header-btns">
                <button class="deck-btn reset" onclick="resetWorkout()">Reset</button>
                <button class="deck-btn" onclick="closeDeck()">Salir</button>
            </div>
            
            <div id="edge-left" class="edge-indicator nope">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
            <div id="edge-right" class="edge-indicator like">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>

            <div id="cards-wrapper"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="entrenos.js"></script>
</body>
</html>
