<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlowApp - Journaling</title>
    <!-- Primero carga el CSS compartido, luego el específico -->
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menú Lateral -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Menú</h2>
            <button id="close-menu">✕</button>
        </div>
        <ul class="nav-links">
            <li class="active" onclick="window.location.href='index.html'">📓 Journaling</li>
            <li onclick="window.location.href='habitos.html'">⚡ Hábitos</li>
            <li class="onclick">💪 Entrenamientos (Próximamente)</li>
        </ul>
    </nav>
    <div id="overlay" class="overlay"></div>

    <!-- Contenedor Principal de la App -->
    <div class="app-container">
        <header>
            <button id="menu-btn" class="icon-btn">☰</button>
            <div class="logo">
                <span class="gradient-text">FlowApp</span>
            </div>
        </header>

        <main id="journal-screen">
            <h1 id="greeting" class="fade-in">Hola, Cargando...</h1>
            <div id="chat-container" class="chat-container"></div>
        </main>

        <footer id="input-area" class="input-area hidden">
            <input type="text" id="journal-input" placeholder="Escribe aquí tu día..." autocomplete="off">
            <button id="send-btn" class="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                </svg>
            </button>
        </footer>
    </div>

    <!-- Toasts y Script -->
    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
